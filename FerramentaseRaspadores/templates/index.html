<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Utilitários BI</title>

    <!-- Bootstrap -->
    <link 
        rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- Fonte -->
    <link 
        rel="stylesheet" 
        href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&display=swap"
    >

    <!-- CSS próprio -->
    <link 
        rel="stylesheet" 
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>
    <header class="container text-center py-5">
        <h1 class="titulo-sistema">
            Utilitários BI
        </h1>
    </header>

    <main class="container">
        <nav class="d-flex justify-content-center gap-3 mb-5">
            <button 
                type="button" 
                class="btn btn-outline-secondary botao-menu" 
                data-tipo="ferramentas" 
                id="botaoFerramentas"
            >
                Ferramentas
            </button>

            <button 
                type="button" 
                class="btn btn-outline-secondary botao-menu" 
                data-tipo="raspadores" 
                id="botaoRaspadores"
            >
                Raspadores
            </button>
        </nav>

        <section id="conteudo" class="row justify-content-center g-4">
        </section>
    </main>

    <footer class="footer-bi">
        DADOS COE
    </footer>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- ExcelJS para XLSX -->
    <script 
        src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js">
    </script>

    <!-- PapaParse para CSV -->
    <script 
        src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js">
    </script>

    <!-- Validação das planilhas -->
    <script 
        src="{{ url_for('static', filename='js/validar-planilhas.js') }}">
    </script>

    <!-- JS principal -->
    <script 
        src="{{ url_for('static', filename='js/script.js') }}">
    </script>
</body>

</html>
